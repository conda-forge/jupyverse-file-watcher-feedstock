schema_version: 1

context:
  version: "0.1.1"

package:
  name: jupyverse-file-watcher
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-file-watcher/jupyverse_file_watcher-${{ version }}.tar.gz
    sha256: 84bea477a6c80c7ca201575ae68af78d4c16ab3ac7c4148cc09ddeaa1158bf52

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio

tests:
  - python:
      imports: jupyverse_file_watcher
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/file_watcher
  summary: The API for Jupyverse's file watcher.

extra:
  recipe-maintainers:
    - davidbrochart
